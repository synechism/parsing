services:
  mineru:
    image: ${MINERU_IMAGE:-mineru-api:latest}
    gpus: all
    environment:
      MINERU_API_HOST: 0.0.0.0
      MINERU_API_PORT: 8000
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MINERU_DEVICE_MODE: cuda
      MINERU_MODEL_SOURCE: local
      MODE: standalone
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.9}
      MINERU_API_OUTPUT_ROOT: /data/mineru-output
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-4}
      MINERU_PROCESSING_WINDOW_SIZE: ${MINERU_PROCESSING_WINDOW_SIZE:-64}
      MINERU_API_TASK_RETENTION_SECONDS: ${MINERU_API_TASK_RETENTION_SECONDS:-86400}
    volumes:
      - mineru-output:/data/mineru-output
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: pdfparse-agent-api:local
    depends_on:
      mineru:
        condition: service_healthy
    environment:
      MINERU_BASE_URL: http://mineru:8000
      STORAGE_ROOT: /data
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      DEFAULT_BACKEND: ${DEFAULT_BACKEND:-hybrid-auto-engine}
      DEFAULT_PARSE_METHOD: ${DEFAULT_PARSE_METHOD:-auto}
      DEFAULT_LANG: ${DEFAULT_LANG:-en}
      JOB_RESULT_TIMEOUT_SECONDS: ${JOB_RESULT_TIMEOUT_SECONDS:-7200}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"

  table-agent:
    build:
      context: .
      dockerfile: docker/mastra-agent.Dockerfile
    image: table-compare-mastra-agent:local
    user: "${HOST_UID:-1001}:${HOST_GID:-1001}"
    depends_on:
      mineru:
        condition: service_healthy
    environment:
      MINERU_BASE_URL: http://mineru:8000
      TABLE_COMPARE_STORAGE_ROOT: /data
      TABLE_COMPARE_WORKER_CONCURRENCY: ${TABLE_COMPARE_WORKER_CONCURRENCY:-4}
      JOB_RESULT_TIMEOUT_SECONDS: ${JOB_RESULT_TIMEOUT_SECONDS:-7200}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      MASTRA_MODEL: ${MASTRA_MODEL:-anthropic/deepseek-v4-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    volumes:
      - ./data:/data
    ports:
      - "8090:8090"

  gotenberg:
    image: gotenberg/gotenberg:8
    profiles: ["fixtures"]
    ports:
      - "${GOTENBERG_PORT:-3001}:3000"

volumes:
  mineru-output:
